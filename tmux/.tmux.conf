# reload tmux config
unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-s
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g repeat-time 500

# some vim motions
setw -g mode-keys vi

# move between panes (splits) — no prefix, Alt+hjkl
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# status-bar at the top
set-option -g status-position top

bind-key -r C-h resize-pane -L 2
bind-key -r C-j resize-pane -D 2
bind-key -r C-k resize-pane -U 2
bind-key -r C-l resize-pane -R 2

bind-key -r C-p split-window -h
bind-key -r C-o split-window -v
# move between windows (buffers) — prefix + hjkl
bind-key -r h previous-window
bind-key -r k previous-window
bind-key -r l next-window
bind-key -r j next-window

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'

set -g @dracula-show-powerline true
set -g @dracula-plugins "cwd ram-usage cpu-usage"
set -g @dracula-show-left-icon session

run '~/.tmux/plugins/tpm/tpm'
